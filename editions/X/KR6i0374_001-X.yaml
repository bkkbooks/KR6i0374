body:
  text: 文二初題目佛說盂蘭盆經晉武帝時剎法師翻云盂蘭盆經盂蘭是西域之語此云倒懸盆唐三藏翻云救器若隨方俗應曰救倒懸盆二本文三初序分二初證信序聞如是一時佛在舍衛國祇樹給孤獨園六緣闕眾然不說則已說則必具徒眾故經末云四輩弟子歡喜奉行聞緣為初異餘經者各是譯人之意謂或云如是之法我從佛聞或云我於佛邊聞如是法皆是指法之詞也不云我者意彰聖人皆證無我理故餘經有者即阿難自指五蘊假者不同情計之我亦無過也祇樹云云長者布金買園惟少一隅太子遂施所餘之地置立門屋施園中樹以為林陰二發起序六初目連道滿大目犍連始得六通目犍連姓唐言菉菽氏彼國上古有仙常食菉荳故仍以為氏尊者是彼之種族也名尼拘律陀即樹名也因祭此樹神而生故名之也然時人貴其種故令稱其氏始得六通者初得聖道便度二親本因親而修道也道雖無異本願各殊諸聖者不必皆爾二知恩欲酬欲度父母報乳哺之恩上句通舉父母下句偏重母也度脫正是其報恩三攀慕徧尋即以道眼觀視世間觀視世間是天眼通由證道而得故云道眼四得見所在見其父母生餓鬼中不見飲食皮骨連立生餓鬼中是異熟果酬引業故不見飲食是等流果酬滿業故皮骨連立是增上果準正理論鬼本住在此洲之下五百由旬縱廣亦爾有琰魔羅界人間一月為一日乘此積月積年壽五百歲五慟哭往救目連悲哀即以鉢盛飯往餉其母三藏科云摧慟釋云感激徹於骨髓號呌動於天地六惡習現在母得鉢飯便以左手障鉢右手揣食食未入口化成火炭遂不得食左手障鉢慳恐餘侵右手揣食貪於自給揣攬取也慳貪猛盛如此現行飯食劣緣若何克濟上序分竟二正宗分二初目連悲陳苦厄目連大呌悲號涕泣馳還白佛具陳如此子急告父臣急告君自力不及理宜投佛二如來廣示因緣八一彰母罪深佛言汝母罪根深結有經說定光佛時目連名羅卜母字青提羅卜出行囑其母曰若有客來孃當具饍去後客至母乃不供仍更詐為設食之筵兒皈問曰昨日客來若為備擬母曰汝豈不見設食處耶從爾已來五百生中慳慳相續故云罪根深結問自定光佛世已來所生之母不一如何偏救彼之青提答青提與目連緣深今生復為其母但救此身所生之母非謂救彼遠世青提餘論云云皆為未達二明子德劣非汝一人力所奈何汝母慳心慳於一切時經多世事歷多人豈汝一人力可濟救三斥邪無力汝雖孝順聲動天地天神地祇邪魔外道道士四天王神亦不能奈何三藏云縱汝感天靈于上界激地祇于下方縱攝邪魔橫羅外道統六合以同一家總八部以為一眾併其神力亦不奈何道士外道之道士也四顯正有能當須十方眾僧威神之力乃得解脫三藏云一縷不能制象必假多絲一人不能制業必資眾德五許以救方吾今當說救濟之法令一切難皆離憂苦非但令汝母離苦亦離一切憂苦六示其正法二初教弟子獻供之法五初定勝時自恣日為勝時佛告目連十方眾僧七月十五日僧自恣時僧自恣僧字於上眾僧為重語也此是譯人之失何不云共自恣時自恣者自己之過恣他所舉謂一夏安居雖謹護浮囊猶恐當局者迷必藉傍觀得失故偏袒於眾中白言大德長老或見我過或聞我罪或疑我犯恣任所舉哀愍語我我當懺悔如此則身心清淨供養此者濟先亡資熏現存故三藏云比丘受歲之日大眾自恣之時僧多獲道於四果人能濟厄於七代二發勝意孝心為勝意當為七世父母及現在父母厄難中者七世者儒教所宗以形質為本傳體相續以父祖已上為七世故偏尊於父佛教所宗以靈識為本四大形質為靈識所依世世生生皆有父母生養此身已去乃至七生所生父母為七世也然寄託之處惟在母胎生來乳哺懷抱亦多是母故偏重於母是以經但言報乳哺之恩三藏云天地覆載既無憚於劬勞幽顯沉淪理合答於罔極三設勝供百味五果為勝供具飯百味五果汲灌盆器香油錠燭牀敷臥具盡世甘味以著盆中供養十方大德眾僧飯為總統於百味百者大數非定百也五果一核果二膚果三殻果四𥢶果如蘇荏等五角果如菱荳等汲灌盆器沐浴所用下著盆中正是盂蘭盆也然如何牀等可置盆中應是著於盂蘭盆供會之中也三藏云汝須物華四事盆味八珍歷十方而運想澄一心而供養四讚勝田賢聖為勝田當此之日一切聖眾或在山間禪定或得四道果或在樹下經行或六通自在教化聲聞緣覺或十地菩薩大人權現比丘在大眾中皆同一心受鉢和羅飯具清淨戒聖眾之道其德汪洋鉢和羅飯鉢中飯也梵云鉢多羅此云應量器和字訛也今時但云鉢者略也經題云盆即是鉢譯時隨俗云盆盆之與鉢皆是器也故三藏釋題翻為救器五獲勝益存亡父母離苦生天為勝益其有供養此等自恣僧者現世父母六親眷屬得出三途之苦應時解脫衣食自然若父母現在者福樂百年若七世父母生天自在化生入天華光此等自恣僧者指前勝田也現世云云離苦若父母云云得樂而衣食自然一句且翻三途生人天故屬拔苦之文亦可得樂屬於後也初現世父母生此身父母故云現世非謂未亡名為現世也故指得益云出三途其現在未亡之父母下自有文故指得益云福樂百年二教眾僧受供之儀時佛勅十方眾僧皆先為施主家呪願願七世父母行禪定意然後受食初受食時先安在佛前塔寺中佛前眾僧呪願竟便自受食前半淨三業呪願口業禪定意業受食身業也後半具三寶塔前是佛呪願是法受食是僧也塔者意通殿塔塔安舍利殿安佛像也七孝子領悟時目連比丘及大菩薩眾皆大歡喜目連悲啼泣聲釋然除滅淨業既成必知離苦故喜而止啼也八慈母獲益時目連母即於是日得脫一切餓鬼之苦先受教領悟次施設盆供後當獲益令領悟次便云脫苦者譯經闕略也應敘結集家文云爾時目連聞是法已至七月十五日施設盆供供自恣僧時目連母即於是日得脫一切餓鬼之苦云則文義俱顯矣三藏云孝子既獻供於此晨慈母乃除殃於是日上正宗分竟三流通分三一申請目連復白佛言弟子所生母得蒙三寶功德之力眾僧威神之力故若未來世一切佛弟子亦應奉盂蘭盆救度現在父母乃至七世父母可為爾不說此語時亦是設供之後非一席之事至畢鉢羅窟方始總集為經也二讚請佛言大善快問我正欲說汝今復問大善快問者深契聖心下二句釋所以三答請五一教起行善男子若比丘比丘尼國王太子大臣宰相三公百官萬民庶人行慈孝者皆應先為所生現在父母過去七世父母於七月十五日佛歡喜日僧自恣日以百味飲食安盂蘭盆中施十方自恣僧歡喜日比丘九旬加行日滿倍更懇誠稱佛本意寧不歡喜二教發願願使現在父母壽命百年無病無一切苦惱之患乃至七世父母離餓鬼苦生人天中福樂無極願者心之樂欲欲得存歿咸樂三教常作是佛弟子修孝順者應念念中常憶父母乃至七世父母年年七月十五日常以孝慈憶所生父母為作盂蘭盆施佛及僧以報父母長養慈愛之恩是佛弟子修孝順者者反明非佛弟子及不孝順者也亦可指上起行中比丘比丘尼乃至萬民庶人行慈孝者也何也以聞佛所說如說行則皆是佛弟子也故上申請下受持中皆云一切佛弟子三藏云父母結愛既念念不去心孝子報恩須年年不絕供四勸受持若一切佛弟子應當奉持是法智論云信力故受念力故持奉即受也五喜而奉命時目連比丘四輩弟子歡喜奉行四輩僧尼士女或云人天龍鬼曹溪山沙彌元奇書此疏圭峯禪師僧自恣日供養三寶已歷多載兼講其誥因歸鄉依日開設道俗耆艾悲喜遵行異口同音請製新疏式𠃔來請發揮要道者也然其諸加懸談一如華嚴圓覺等經慈悲攸暨然則然矣此經是人天因果教依而行之則已不必廣說且至於釋文多有引用致使初學淺識未閱望門而退故令略抄其直釋之文要使文義簡而易近而彰不是各說所見覽者幸勿深哨焉旹大清光緒庚辰五月日小林門人有炯書于楊州浮圖庵塔光室中
